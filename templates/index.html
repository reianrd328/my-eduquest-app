<!-- ADD THIS INSIDE YOUR GRADE SELECTION CARD OR ABOVE THE BUTTONS -->
<div id="name-screen" style="margin-bottom: 20px; text-align: center;">
    <label for="player-name" style="font-weight: bold; color: #fff; display: block; margin-bottom: 8px;">Enter Your Name Hero: </label>
    <input type="text" id="player-name" placeholder="Type your name here..." style="padding: 10px; border-radius: 8px; border: none; font-size: 16px; width: 80%; max-width: 300px; text-align: center;">
</div>

<!-- UPDATE YOUR SCORE SCREEN BLOCK TO LOOK LIKE THIS -->
<div id="score-screen" class="hidden" style="text-align: center;">
    <h2>Quest Complete! 🎉</h2>
    <p style="font-size: 20px; color: #fff;">Great job, <span id="display-player-name" style="color: #ffeb3b; font-weight: bold;"></span>!</p>
    <p style="font-size: 24px;">You scored <span id="final-score">0</span> out of <span id="total-score">20</span>!</p>
    
    <hr style="margin: 20px 0; border-color: rgba(255,255,255,0.2);">
    
    <h3>🏆 Top 10 Hall of Fame</h3>
    <table id="leaderboard-table" style="width: 100%; max-width: 400px; margin: 0 auto 20px auto; border-collapse: collapse; background: rgba(0,0,0,0.4); border-radius: 12px; color: #fff;">
        <thead>
            <tr style="border-bottom: 2px solid #fff;">
                <th style="padding: 10px;">Rank</th>
                <th style="padding: 10px;">Name</th>
                <th style="padding: 10px;">Grade</th>
                <th style="padding: 10px;">Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <!-- Scores will be injected here dynamically -->
        </tbody>
    </table>

    <button class="option-btn" onclick="goBack()" style="background: #4caf50; width: auto; padding: 10px 30px;">Play Again 🔄</button>
</div>
